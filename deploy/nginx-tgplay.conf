# TGPlay — Nginx конфиг (все домены → один бэкенд на порту 8000).
#
# Первичная установка сертификата (оба домена в одном сертификате):
#   certbot --nginx -d tgplay.fun -d www.tgplay.fun
#
# Если сертификат уже выдан только для tgplay.fun, при необходимости перевыпусти/расширь:
#   certbot --expand -d tgplay.fun -d www.tgplay.fun --nginx
#
# После обновления:
#   nginx -t && systemctl reload nginx
#
# DNS: A-записи tgplay.fun и www.tgplay.fun должны указывать на текущий IP сервера.

upstream tgplay_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP: всё перенаправляем на HTTPS (кроме certbot .well-known) ──────────
server {
    listen 80;
    listen [::]:80;
    server_name tgplay.fun www.tgplay.fun _;

    # Let's Encrypt ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: основной блок ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tgplay.fun www.tgplay.fun;

    # После certbot --expand сертификат будет содержать SAN для всех трёх доменов.
    # certbot подставляет пути автоматически при --nginx; вручную:
    ssl_certificate     /etc/letsencrypt/live/tgplay.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tgplay.fun/privkey.pem;

    # Современные TLS-настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS: браузер принудительно использует HTTPS на год (preload — опционально)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;
    proxy_connect_timeout 15s;
    proxy_send_timeout 90s;
    proxy_read_timeout 120s;

    location / {
        proxy_pass http://tgplay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }
}
